    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torriden - Kbeauty With Me</title>

    <style>
        :root { --torriden-blue: #a3c9e2; --dark-blue: #2c5a94; }
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; background-color: #f7fbff; color: #333; overflow-x: hidden; }
        
        header { display: flex; justify-content: space-between; padding: 20px 5%; align-items: center; background: white; border-bottom: 1px solid #e1e1e1; }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 35px; height: 35px; background: #4a90e2; border-radius: 8px; color: white; display: flex; justify-content: center; align-items: center; font-weight: bold; }
        
        .hero { display: flex; align-items: center; justify-content: space-between; padding: 60px 10%; position: relative; }
        
        /* Ribbon giống hệt hình mẫu */
        .ribbon { 
            background: linear-gradient(180deg, #7eb6e2 0%, #4a90e2 100%); 
            color: white; padding: 30px 50px; border-radius: 5px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center;
        }
        .ribbon h1 { margin: 0; font-size: 42px; line-height: 1.2; font-weight: bold; }
        
        .sub-text { font-size: 20px; margin-top: 25px; font-weight: 500; }

        /* Nút bấm hình kim cương để đo CTR */
        .cta-button { 
            background: #4b89c9; color: white; padding: 18px 45px; 
            font-size: 22px; font-weight: bold; border: 2px solid white; 
            cursor: pointer; margin-top: 35px; 
            clip-path: polygon(10% 0%, 90% 0%, 100% 50%, 90% 100%, 10% 100%, 0% 50%);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.3s;
        }
        .cta-button:hover { background: var(--dark-blue); transform: scale(1.05); }

        /* Phần hình ảnh đã được fix để hiển thị */
        .product-display { flex: 1; display: flex; justify-content: flex-end; }
        .img-container {
            width: 450px; height: 450px;
            background-image: url('https://image.oliveyoung.co.kr/uploads/images/goods/10/0000/0014/A00000014658101kr.jpg');
            background-size: contain; background-repeat: no-repeat; background-position: center;
            filter: drop-shadow(10px 10px 20px rgba(0,0,0,0.1));
        }

        .features { display: flex; justify-content: center; gap: 60px; padding: 50px; background: white; }
        .feature-item { text-align: center; }
        .icon { width: 65px; height: 65px; border: 2px solid #4a90e2; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 28px; }
    </style>
</head>
<body>

<header>
    <div class="logo-box"><div class="logo-icon">K</div><div style="font-weight:bold; color:#4a90e2">Kbeauty With Me</div></div>
    <nav style="font-weight: bold; color: #666;">Home &nbsp;&nbsp; Shop &nbsp;&nbsp; Specials &nbsp;&nbsp; About Us</nav>
</header>

<section class="hero">
    <div class="content">
        <div class="ribbon">
            <h1 id="test-headline">지금 구매하면<br>20% 할인!</h1>
        </div>
        <p class="sub-text">수분이 필요한 순간, 토리든으로 채우세요!</p>
        <button id="main-cta-button" class="cta-button">지금 보러 가기 ▶</button>
    </div>

    <div class="product-display">
        <div class="img-container"></div>
    </div>
</section>

<div class="features">
    <div class="feature-item"><div class="icon">💧</div><p><b>수분 집중 케어</b></p></div>
    <div class="feature-item"><div class="icon">🛡️</div><p><b>피부 장벽 강화</b></p></div>
    <div class="feature-item"><div class="icon">🍃</div><p><b>민감 피부 안심</b></p></div>
</div>

</body>
